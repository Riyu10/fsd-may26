<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url(./Screenshot\ 2026-07-07\ 133040.png);
        }
        .box{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            width: 300px;
            background-color: aqua;
            border: 20px solid red;
            margin: 100px;
            padding: 20px;
            box-sizing: border-box;
        }
        a:hover{
            color: violet;
        }
        a:active{
            color: red;
        }
        a:focus{
            color: chartreuse;
        }
        a:visited{
            color: yellow;
        }
        input:focus{
            outline: blue auto 3px;
        }
    </style>
</head>
<body>

    <div class="box">Box</div>
    <a href="http://google.com">Link</a>
    <form action="">
        <input type="email" name="" id="input1">

    </form>
    

</body>
